name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment directory
        run: |
          set -euo pipefail
          mkdir -p deploy/
          for entry in *; do
            case "$entry" in
              AGENTS.md|README.md|deploy|node_modules|sites)
                continue
                ;;
            esac

            if [ -e "$entry" ]; then
              cp -R "$entry" deploy/
            fi
          done

          cp -R sites/. deploy/
          ls -l deploy/

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio site with Vite
        run: pnpm build

      - name: Prepare deployment directory
        run: |
          # Create a deploy folder and copy Vite's build output into it.
          mkdir deploy/
          cp -R dist/* deploy/ 
          cp -R sites/* deploy/
          ls -l deploy/
          # Copy additional static files if they exist.
          [ -f CNAME ] && cp CNAME deploy/ || true
          [ -f favicon.ico ] && cp favicon.ico deploy/ || true

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

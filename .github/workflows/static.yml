name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment directory
        run: |
          mkdir -p deploy/
          [ -f index.html ] && cp index.html deploy/ || true
          [ -d assets ] && cp -R assets deploy/ || true
          cp -R sites/. deploy/
          ls -l deploy/
          [ -f CNAME ] && cp CNAME deploy/ || true
          [ -f favicon.ico ] && cp favicon.ico deploy/ || true

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
